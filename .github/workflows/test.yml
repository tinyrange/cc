name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-contract:
    name: OpenAPI contract
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate OpenAPI and route inventory
        run: go test ./internal/ccvmd -run '^TestOpenAPIContract$' -count=1

  go-test:
    name: Go tests (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-24.04
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos-amd64
            runner: macos-15-intel
          - name: macos-arm64
            runner: macos-15
          - name: windows-amd64
            runner: windows-2025
          - name: windows-arm64
            runner: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Linux test tools
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dosfstools musl-tools

      - name: Run vet
        if: runner.os != 'Windows'
        run: go vet ./...

      - name: Run vet (Windows)
        if: runner.os == 'Windows'
        # Hyper-V bindings intentionally convert syscall uintptr values at the
        # audited ABI boundary. Keep every other vet analyzer enabled.
        run: go vet -unsafeptr=false ./...

      - name: Install Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2026.1

      - name: Run correctness static analysis
        # SA1019 flags archive/tar.TypeRegA compatibility handling; SA6002 is
        # an allocation advisory. Neither is a correctness failure.
        run: staticcheck -checks='SA*,-SA1019,-SA6002' ./...

      - name: Run tests
        run: go test -short ./... -count=1 -timeout 30m

  race-test:
    name: Lifecycle and ownership race tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run targeted race tests
        run: go test -race -short ./internal/ccvmd ./internal/netstack ./internal/virtio ./internal/vm/... -count=1 -timeout 15m

  kvm-test:
    name: KVM and rootfs tests (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: freebsd-oci-runtime
            packages: ./internal/vm
            test_run: ^TestRuntimeBootsFreeBSDBuiltinImage$
          - name: kvm-openbsd
            packages: ./internal/hv/kvm
            test_run: ^(TestBootOpenBSD|TestOpenBSD)
          - name: kvm-netbsd
            packages: ./internal/hv/kvm
            test_run: ^(TestBootNetBSD|TestNetBSD)
          - name: vm-runtime
            packages: ./internal/vm
            test_run: ^TestRuntime(BootsLinux|OneShot|RejectsInvalidRequests|BootsPersistentLinux|Persistent|Isolated)
          - name: rootfs-support
            packages: ./internal/fsimage/ffs ./internal/netbsd/rootfs ./internal/openbsd/rootfs
            test_run: .
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install test tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dosfstools musl-tools

      - name: Enable KVM for the runner user
        run: |
          set -euo pipefail
          test -e /dev/kvm
          sudo chmod 666 /dev/kvm
          test -r /dev/kvm -a -w /dev/kvm

      - name: Cache runtime artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccx3
          key: cc-runtime-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            cc-runtime-${{ runner.os }}-${{ runner.arch }}-

      - name: Build guest init payloads
        run: |
          set -euo pipefail
          start=$SECONDS
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -o internal/guestinit/guest-init-linux-arm64 ./internal/cmd/init
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o internal/guestinit/guest-init-linux-amd64 ./internal/cmd/init
          for goarch in arm64 amd64; do
            for bsd in openbsd freebsd netbsd; do
              CGO_ENABLED=0 GOOS="$bsd" GOARCH="$goarch" go build -trimpath -o "internal/${bsd}/guestinit/guest-init-${bsd}-${goarch}" "./internal/cmd/${bsd}-init"
            done
          done
          echo "guest init payload build took $((SECONDS - start))s"

      - name: Run KVM/rootfs test shard
        env:
          CC_TEST_LINUX_KVM_PCI: "1"
          CC_TEST_OPENBSD_KVM: "1"
          CC_TEST_OPENBSD_STARTUP_MAX_MS: "3000"
          CC_TEST_OPENBSD_FULL_BASE_FFS: "1"
          CC_TEST_FREEBSD_KVM: "1"
          CC_TEST_NETBSD_ROOTFS: "1"
          CC_TEST_NETBSD_KVM: "1"
          TEST_PACKAGES: ${{ matrix.packages }}
          TEST_RUN: ${{ matrix.test_run }}
        run: |
          set -euo pipefail
          start=$SECONDS
          # The regular matrix already runs `go test -short ./...` across all
          # platforms. This job only enables the expensive KVM/rootfs tests and
          # runs the packages that contain those gated checks.
          run_args=()
          if [ "$TEST_RUN" != "." ]; then
            run_args=(-run "$TEST_RUN")
          fi
          go test -tags embed_guestinit -p 1 "${run_args[@]}" ${TEST_PACKAGES} -count=1 -timeout 40m
          echo "KVM/rootfs shard '${{ matrix.name }}' took $((SECONDS - start))s"
