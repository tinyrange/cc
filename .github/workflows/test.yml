name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go tests (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-24.04
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos-amd64
            runner: macos-15-intel
          - name: macos-arm64
            runner: macos-15
          - name: windows-amd64
            runner: windows-2025
          - name: windows-arm64
            runner: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Linux test tools
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dosfstools musl-tools

      - name: Run tests
        run: go test -short ./... -count=1 -timeout 30m

  kvm-test:
    name: KVM and rootfs tests
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install test tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dosfstools musl-tools

      - name: Enable KVM for the runner user
        run: |
          set -euo pipefail
          test -e /dev/kvm
          sudo chmod 666 /dev/kvm
          test -r /dev/kvm -a -w /dev/kvm

      - name: Cache runtime artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccx3
          key: cc-runtime-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            cc-runtime-${{ runner.os }}-${{ runner.arch }}-

      - name: Run all tests with KVM suites enabled
        env:
          CC_TEST_LINUX_KVM_PCI: "1"
          CC_TEST_OPENBSD_KVM: "1"
          CC_TEST_OPENBSD_STARTUP_MAX_MS: "3000"
          CC_TEST_OPENBSD_FULL_BASE_FFS: "1"
          CC_TEST_FREEBSD_ROOTFS: "1"
          CC_TEST_FREEBSD_KVM: "1"
          CC_TEST_NETBSD_ROOTFS: "1"
          CC_TEST_NETBSD_KVM: "1"
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -o internal/guestinit/guest-init-linux-arm64 ./internal/cmd/init
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o internal/guestinit/guest-init-linux-amd64 ./internal/cmd/init
          for goarch in arm64 amd64; do
            for bsd in openbsd freebsd netbsd; do
              CGO_ENABLED=0 GOOS="$bsd" GOARCH="$goarch" go build -trimpath -o "internal/${bsd}/guestinit/guest-init-${bsd}-${goarch}" "./internal/cmd/${bsd}-init"
            done
          done
          go test -tags embed_guestinit -p 1 ./... -count=1 -timeout 75m
