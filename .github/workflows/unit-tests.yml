name: Unit tests

"on":
  push:
    branches:
      - main
      - feature/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go unit tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go unit tests
        run: go test ./...

  python:
    name: Python unit tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Build ccvm for editable Python install
        run: |
          mkdir -p build
          go build -o build/ccvm ./cmd/ccvm

      - name: Run Python unit tests
        working-directory: pyneurodesk
        env:
          PYNEURODESK_CCVM: ${{ github.workspace }}/build/ccvm
        run: uv run pytest

  cross-compile:
    name: Cross-compile supported targets
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compile Linux arm64 packages
        run: GOOS=linux GOARCH=arm64 go test -run '^$' -exec /bin/true ./...

      - name: Compile Darwin arm64 HVF package
        run: GOOS=darwin GOARCH=arm64 go test -c -o /tmp/ccx3-hvf-darwin-arm64.test ./internal/hv/hvf
