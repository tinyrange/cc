name: KVM tests

"on":
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/kvm-tests.yml"
      - "cmd/**"
      - "client/**"
      - "fixtures/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "pyneurodesk/**"
      - "tools/**"

permissions:
  contents: read

jobs:
  kvm:
    name: Go and Python tests with KVM
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Enable runner access to /dev/kvm
        run: |
          set -euxo pipefail
          if [ ! -e /dev/kvm ]; then
            echo "/dev/kvm is not available on this runner" >&2
            exit 1
          fi
          sudo chown root:kvm /dev/kvm
          sudo chmod 0666 /dev/kvm
          test -r /dev/kvm -a -w /dev/kvm
          id
          ls -l /dev/kvm

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python tooling
        run: python -m pip install --upgrade pip uv

      - name: Run Go unit tests
        run: |
          test -r /dev/kvm -a -w /dev/kvm
          ls -l /dev/kvm
          go test ./...

      - name: Run KVM boot smoke tests
        env:
          CCX3_KVM_BOOT: "1"
        run: |
          test -r /dev/kvm -a -w /dev/kvm
          go test ./internal/hv/kvm -run 'TestProbeReportsVMCreation|TestKernelBootSerial|TestInitramfsBootReadyMarker' -count=1

      - name: Build ccvm for Python unit tests
        run: |
          mkdir -p build
          go build -o build/ccvm ./cmd/ccvm

      - name: Run Python unit tests
        env:
          CCX3_CCVM: ${{ github.workspace }}/build/ccvm
        working-directory: pyneurodesk
        run: |
          test -r /dev/kvm -a -w /dev/kvm
          ls -l /dev/kvm
          uv run pytest
