# Generic shell and filesystem fulltest suite
# Exercises small POSIX/Bash and core filesystem behaviors inside a Neurocontainers image.

name: thesistests
version: 1.0
container: niimath_1.0.20250804_20251016.simg
default_timeout: 120

test_data:
  output_dir: /tmp/thesistests

env_setup: |
  export LC_ALL=C
  export LANG=C

setup:
  script: |
    #!/usr/bin/env bash
    set -euo pipefail
    rm -rf "${output_dir}"
    mkdir -p "${output_dir}"

cleanup:
  script: |
    #!/usr/bin/env bash
    set -euo pipefail
    rm -rf "${output_dir}"

tests:
  # ==========================================================================
  # SHELL FUNDAMENTALS
  # ==========================================================================
  - name: Shell echo emits text
    description: Verify basic command execution and stdout capture.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case001.XXXXXX")
        echo shell-basic >/dev/null
        echo PASS_001
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_001"
    expected_exit_code: 0

  - name: Printf preserves newlines
    description: Verify printf formatting with multiple lines.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case002.XXXXXX")
        printf "alpha\nbeta\n" > "$d/out"
        grep -q beta "$d/out"
        echo PASS_002
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_002"
    expected_exit_code: 0

  - name: Variable assignment works
    description: Verify local shell variables can be assigned and expanded.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case003.XXXXXX")
        value=alpha
        test "$value" = alpha
        echo PASS_003
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_003"
    expected_exit_code: 0

  - name: Exported variables reach child shells
    description: Verify environment exports propagate to child processes.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case004.XXXXXX")
        export THESIS_VALUE=exported
        bash -lc "test \"$THESIS_VALUE\" = exported"
        echo PASS_004
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_004"
    expected_exit_code: 0

  - name: Arithmetic expansion works
    description: Verify integer arithmetic expansion.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case005.XXXXXX")
        value=$((17 + 25))
        test "$value" = 42
        echo PASS_005
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_005"
    expected_exit_code: 0

  - name: Command substitution captures stdout
    description: Verify command substitution in assignment context.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case006.XXXXXX")
        value=$(printf capture)
        test "$value" = capture
        echo PASS_006
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_006"
    expected_exit_code: 0

  - name: Subshell keeps parent variables isolated
    description: Verify subshell variable changes do not leak to parent.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case007.XXXXXX")
        value=outer
        (value=inner; test "$value" = inner)
        test "$value" = outer
        echo PASS_007
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_007"
    expected_exit_code: 0

  - name: Brace grouping shares parent shell
    description: Verify grouped commands can write shared state.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case008.XXXXXX")
        { echo one; echo two; } > "$d/grouped"
        grep -q two "$d/grouped"
        echo PASS_008
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_008"
    expected_exit_code: 0

  - name: Case statement matches pattern
    description: Verify case pattern dispatch.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case009.XXXXXX")
        value=banana
        case "$value" in b*) result=fruit ;; *) result=other ;; esac
        test "$result" = fruit
        echo PASS_009
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_009"
    expected_exit_code: 0

  - name: For loop iterates words
    description: Verify for loops append expected values.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case010.XXXXXX")
        out=
        for word in a b c; do out="${out}${word}"; done
        test "$out" = abc
        echo PASS_010
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_010"
    expected_exit_code: 0

  - name: While loop increments counter
    description: Verify while loop control flow.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case011.XXXXXX")
        i=0
        sum=0
        while [ "$i" -lt 4 ]; do sum=$((sum + i)); i=$((i + 1)); done
        test "$sum" = 6
        echo PASS_011
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_011"
    expected_exit_code: 0

  - name: Shell function returns success
    description: Verify function declaration and call.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case012.XXXXXX")
        say_ok() { printf ok; }
        test "$(say_ok)" = ok
        echo PASS_012
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_012"
    expected_exit_code: 0

  - name: Function arguments are passed
    description: Verify positional arguments inside shell functions.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case013.XXXXXX")
        join_args() { printf "%s-%s" "$1" "$2"; }
        test "$(join_args left right)" = left-right
        echo PASS_013
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_013"
    expected_exit_code: 0

  - name: Set e stops failing branch in condition
    description: Verify failure can be handled safely under set -e.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case014.XXXXXX")
        if false; then exit 1; else handled=yes; fi
        test "$handled" = yes
        echo PASS_014
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_014"
    expected_exit_code: 0

  - name: Logical and operator runs second command
    description: Verify && chaining semantics.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case015.XXXXXX")
        touch "$d/a" && test -f "$d/a"
        echo PASS_015
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_015"
    expected_exit_code: 0

  - name: Logical or operator handles failure
    description: Verify || fallback semantics.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case016.XXXXXX")
        false || echo fallback > "$d/out"
        grep -q fallback "$d/out"
        echo PASS_016
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_016"
    expected_exit_code: 0

  - name: Pipeline status succeeds
    description: Verify a successful pipeline with pipefail enabled.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case017.XXXXXX")
        printf "a\nb\n" | grep -q b
        echo PASS_017
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_017"
    expected_exit_code: 0

  - name: Multi line content writes correctly
    description: Verify multi-line content can be written and read.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case018.XXXXXX")
        printf "line-one\nline-two\n" > "$d/here"
        grep -q line-two "$d/here"
        echo PASS_018
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_018"
    expected_exit_code: 0

  - name: Readonly variable rejects reassignment
    description: Verify readonly variables protect values.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case019.XXXXXX")
        readonly locked=value
        if (locked=other) 2>/dev/null; then exit 1; fi
        test "$locked" = value
        echo PASS_019
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_019"
    expected_exit_code: 0

  - name: Trap runs on explicit signal
    description: Verify simple trap handling in a subshell.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case020.XXXXXX")
        (trap "echo trapped > \"$d/trap\"" TERM; kill -TERM $BASHPID) || true
        grep -q trapped "$d/trap"
        echo PASS_020
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_020"
    expected_exit_code: 0

  # ==========================================================================
  # QUOTING AND EXPANSION
  # ==========================================================================
  - name: Double quotes preserve spaces
    description: Verify quoted variable expansion preserves whitespace.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case021.XXXXXX")
        name="two words"
        printf "%s" "$name" > "$d/out"
        test "$(cat "$d/out")" = "two words"
        echo PASS_021
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_021"
    expected_exit_code: 0

  - name: Single quotes prevent expansion
    description: Verify single-quoted text is literal.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case022.XXXXXX")
        printf %s '$HOME' > "$d/out"
        test "$(cat "$d/out")" = '$HOME'
        echo PASS_022
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_022"
    expected_exit_code: 0

  - name: Backslash escapes spaces
    description: Verify escaped spaces form one path component.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case023.XXXXXX")
        touch "$d/file with spaces"
        test -f "$d"/file\ with\ spaces
        echo PASS_023
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_023"
    expected_exit_code: 0

  - name: Glob expands matching files
    description: Verify filename glob expansion.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case024.XXXXXX")
        touch "$d/a.log" "$d/b.log" "$d/c.txt"
        set -- "$d"/*.log
        test "$#" -eq 2
        echo PASS_024
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_024"
    expected_exit_code: 0

  - name: Nonmatching glob remains literal
    description: Verify default bash nonmatching glob behavior.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case025.XXXXXX")
        set -- "$d"/*.missing
        test "$1" = "$d/*.missing"
        echo PASS_025
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_025"
    expected_exit_code: 0

  - name: Character class glob matches
    description: Verify bracket character classes in globs.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case026.XXXXXX")
        touch "$d/a1" "$d/b1" "$d/c1"
        set -- "$d"/[ab]1
        test "$#" -eq 2
        echo PASS_026
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_026"
    expected_exit_code: 0

  - name: Parameter default expansion works
    description: Verify parameter expansion with default value.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case027.XXXXXX")
        unset missing
        test "${missing:-fallback}" = fallback
        echo PASS_027
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_027"
    expected_exit_code: 0

  - name: Parameter replacement works
    description: Verify substring replacement expansion.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case028.XXXXXX")
        value=alpha-beta
        test "${value/beta/gamma}" = alpha-gamma
        echo PASS_028
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_028"
    expected_exit_code: 0

  - name: Parameter length works
    description: Verify string length expansion.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case029.XXXXXX")
        value=abcdef
        test "${#value}" -eq 6
        echo PASS_029
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_029"
    expected_exit_code: 0

  - name: Prefix removal works
    description: Verify shortest prefix removal expansion.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case030.XXXXXX")
        value=path/to/file.txt
        test "${value#path/}" = to/file.txt
        echo PASS_030
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_030"
    expected_exit_code: 0

  - name: Suffix removal works
    description: Verify shortest suffix removal expansion.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case031.XXXXXX")
        value=file.txt
        test "${value%.txt}" = file
        echo PASS_031
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_031"
    expected_exit_code: 0

  - name: Array element expansion works
    description: Verify bash arrays can be indexed.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case032.XXXXXX")
        items=(zero one two)
        test "${items[2]}" = two
        echo PASS_032
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_032"
    expected_exit_code: 0

  - name: Array length expansion works
    description: Verify bash array length.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case033.XXXXXX")
        items=(a b c d)
        test "${#items[@]}" -eq 4
        echo PASS_033
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_033"
    expected_exit_code: 0

  - name: Quoted array preserves element boundaries
    description: Verify quoted array expansion keeps spaces.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case034.XXXXXX")
        items=("a b" "c d")
        set -- "${items[@]}"
        test "$#" -eq 2
        echo PASS_034
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_034"
    expected_exit_code: 0

  - name: Tilde expands to home
    description: Verify tilde expansion points at an existing home directory.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case035.XXXXXX")
        home=~
        test -d "$home"
        echo PASS_035
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_035"
    expected_exit_code: 0

  - name: PWD variable follows cd
    description: Verify PWD is updated by cd.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case036.XXXXXX")
        mkdir "$d/sub"
        cd "$d/sub"
        test "$PWD" = "$(pwd)"
        echo PASS_036
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_036"
    expected_exit_code: 0

  - name: OLDPWD variable follows cd dash
    description: Verify OLDPWD is set after directory changes.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case037.XXXXXX")
        start=$PWD
        abs=$(readlink -f "$d")
        cd "$d"
        cd - >/dev/null
        test "$OLDPWD" = "$abs"
        echo PASS_037
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_037"
    expected_exit_code: 0

  - name: IFS splitting can be controlled
    description: Verify custom IFS splitting.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case038.XXXXXX")
        value="a:b:c"
        IFS=: read -r one two three <<< "$value"
        test "$two" = b
        echo PASS_038
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_038"
    expected_exit_code: 0

  - name: Read builtin captures line
    description: Verify read consumes a full line.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case039.XXXXXX")
        printf "hello world\n" | { read -r line; test "$line" = "hello world"; }
        echo PASS_039
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_039"
    expected_exit_code: 0

  - name: Eval runs generated assignment
    description: Verify eval executes generated shell code.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case040.XXXXXX")
        code="answer=42"
        eval "$code"
        test "$answer" = 42
        echo PASS_040
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_040"
    expected_exit_code: 0

  # ==========================================================================
  # REDIRECTION AND STREAMS
  # ==========================================================================
  - name: Stdout redirect creates file
    description: Verify output redirection writes a file.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case041.XXXXXX")
        echo alpha > "$d/out"
        grep -q alpha "$d/out"
        echo PASS_041
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_041"
    expected_exit_code: 0

  - name: Append redirect preserves old content
    description: Verify append redirection appends.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case042.XXXXXX")
        echo one > "$d/out"
        echo two >> "$d/out"
        test "$(wc -l < "$d/out")" -eq 2
        echo PASS_042
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_042"
    expected_exit_code: 0

  - name: Stderr redirect captures errors
    description: Verify stderr can be redirected separately.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case043.XXXXXX")
        ls "$d/missing" 2> "$d/err" || true
        grep -q missing "$d/err"
        echo PASS_043
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_043"
    expected_exit_code: 0

  - name: Stdout and stderr combine
    description: Verify combined stream redirection.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case044.XXXXXX")
        (echo out; echo err >&2) > "$d/both" 2>&1
        grep -q out "$d/both"
        grep -q err "$d/both"
        echo PASS_044
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_044"
    expected_exit_code: 0

  - name: Input redirect feeds command
    description: Verify input redirection to command stdin.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case045.XXXXXX")
        echo needle > "$d/in"
        grep -q needle < "$d/in"
        echo PASS_045
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_045"
    expected_exit_code: 0

  - name: Here string feeds stdin
    description: Verify here-string input.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case046.XXXXXX")
        grep -q needle <<< "needle haystack"
        echo PASS_046
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_046"
    expected_exit_code: 0

  - name: Pipe connects commands
    description: Verify stdout from one command reaches the next.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case047.XXXXXX")
        printf "x\ny\n" | grep -q y
        echo PASS_047
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_047"
    expected_exit_code: 0

  - name: Pipefail catches left failure
    description: Verify pipefail reports failed pipeline members.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case048.XXXXXX")
        if false | true; then exit 1; else ok=yes; fi
        test "$ok" = yes
        echo PASS_048
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_048"
    expected_exit_code: 0

  - name: Tee writes and passes output
    description: Verify tee writes a copy while preserving stdout.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case049.XXXXXX")
        printf alpha > "$d/input"
        tee "$d/copy" < "$d/input" > "$d/stdout"
        grep -q alpha "$d/stdout"
        grep -q alpha "$d/copy"
        echo PASS_049
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_049"
    expected_exit_code: 0

  - name: Diff compares generated files
    description: Verify diff can compare two generated files.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case050.XXXXXX")
        printf "a\n" > "$d/left"
        printf "a\n" > "$d/right"
        diff "$d/left" "$d/right"
        echo PASS_050
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_050"
    expected_exit_code: 0

  - name: Descriptor three can write file
    description: Verify custom file descriptor output.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case051.XXXXXX")
        exec 3> "$d/fd3"
        echo fd-data >&3
        exec 3>&-
        grep -q fd-data "$d/fd3"
        echo PASS_051
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_051"
    expected_exit_code: 0

  - name: Descriptor read can consume file
    description: Verify custom file descriptor input.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case052.XXXXXX")
        echo read-data > "$d/in"
        exec 4< "$d/in"
        read -r line <&4
        exec 4<&-
        test "$line" = read-data
        echo PASS_052
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_052"
    expected_exit_code: 0

  - name: No clobber protects file
    description: Verify noclobber rejects overwrite.
    command: |
      bash <<'THESIS_FULLTEST'
        set -euo pipefail
        d=$(mktemp -d "${output_dir}/case053.XXXXXX")
        echo old > "$d/out"
        set -o noclobber
        if (echo new > "$d/out") 2>/dev/null; then exit 1; fi
        set +o noclobber
        grep -q old "$d/out"
        echo PASS_053
      THESIS_FULLTEST
    expected_output_contains:
      - "PASS_053"
    expected_exit_code: 0

  - name: Clobber override works
